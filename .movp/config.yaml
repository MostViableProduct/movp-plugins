version: 1
review:
  enabled: true
  categories:
    # Default 6 categories — all scored 1-10 by the adversarial model.
    # All weights are equal by default. Increase a weight to emphasize a category.
    # Weights must be positive numbers >= 1.0 (decimals supported).
    - name: correctness
      weight: 1.25
    - name: performance
      weight: 1.0
    - name: reliability
      weight: 1.0
    - name: safety
      weight: 1.5
    - name: simplicity
      weight: 1.0
    - name: usability
      weight: 1.0
    # Add custom categories:
    # - name: accessibility
    #   description: WCAG 2.1 AA compliance
    #   weight: 1.0
  auto_review:
    plan_files: true    # auto-trigger review after writing plan files
    code_output: false  # auto-trigger review after significant code output
  cost_cap_daily_usd: 5.0
  max_rounds: 3
  # rule_apply_mode: "direct"  # "direct" = write rules on confirm; "pr" = create branch + PR
control_plane:
  health_check_interval: 20  # seconds between health checks
  show_cost: true
  show_recommendations: true

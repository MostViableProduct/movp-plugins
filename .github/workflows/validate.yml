name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify plugin-manifest.json is up to date
        run: |
          node scripts/build-manifest.mjs
          git diff --exit-code plugin-manifest.json || {
            echo "::error::plugin-manifest.json is stale. Run scripts/build-manifest.mjs and commit the result."
            exit 1
          }
      - name: Run validation
        run: bash scripts/validate.sh

  test-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run fixture tests
        run: bash scripts/test-validate.sh

  mcp-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install MCP smoke harness
        working-directory: scripts/mcp-smoke
        run: npm ci
      - name: Run MCP smoke test
        working-directory: scripts/mcp-smoke
        run: npm test

name: Repo Policy Check

on:
  # Run manually to verify protection is configured correctly.
  # Once REQUIRED_CHECK_NAME in check-repo-policy.sh is confirmed (after
  # validate.yml runs at least once and the branch rule is set), re-enable
  # the schedule by uncommenting the lines below.
  workflow_dispatch:
  # schedule:
  #   - cron: '0 9 * * 1'   # Monday 09:00 UTC

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repo policy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check-repo-policy.sh

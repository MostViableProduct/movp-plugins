name: Deploy install scripts to get.movp.dev

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
  workflow_dispatch:

concurrency:
  group: deploy-scripts
  cancel-in-progress: false   # queues the next run; does NOT cancel it — in-flight deploy completes first

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: bash scripts/validate.sh

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy scripts/ --project-name movp-install --commit-dirty=true
